name: Build & Release

on:
  push:
    tags:
      - "v*"           # 推送 tag 时触发，如 v1.0.0
  workflow_dispatch:   # 也支持手动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: webrecon-linux-x86_64
            platform: linux

          - os: macos-13          # Intel x86_64
            artifact: webrecon-macos-x86_64
            platform: mac

          - os: macos-latest      # Apple Silicon arm64
            artifact: webrecon-macos-arm64
            platform: mac

          - os: windows-latest
            artifact: webrecon-windows-x86_64.exe
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build (Linux / macOS)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller webrecon.spec \
            --distpath dist \
            --workpath build \
            --clean
          mv dist/webrecon dist/${{ matrix.artifact }}

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pyinstaller webrecon.spec `
            --distpath dist `
            --workpath build `
            --clean
          Move-Item dist\webrecon.exe dist\${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          body: |
            ## 安装说明

            下载对应平台的可执行文件后直接运行，无需 Python 环境。

            **前提**：需已安装 Claude Code CLI
            ```bash
            npm install -g @anthropic-ai/claude-code
            ```

            ### 各平台文件

            | 文件 | 平台 |
            |------|------|
            | `webrecon-linux-x86_64` | Linux x86_64 |
            | `webrecon-macos-x86_64` | macOS Intel |
            | `webrecon-macos-arm64` | macOS Apple Silicon (M1/M2/M3) |
            | `webrecon-windows-x86_64.exe` | Windows x86_64 |

            ### 使用
            ```bash
            # Linux / macOS
            chmod +x webrecon-*
            ./webrecon-macos-arm64 --init-config
            ./webrecon-macos-arm64 -t example.com -i -o report.md

            # Windows
            webrecon-windows-x86_64.exe --init-config
            webrecon-windows-x86_64.exe -t example.com -i -o report.md
            ```
